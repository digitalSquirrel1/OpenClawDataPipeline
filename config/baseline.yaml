# 这是个用于代码上库脱敏的文件，不能跑的。实际能跑的是baseline_using.yaml

api_config:
  OPENAI_API_KEY: "sk-xxx"
  OPENAI_BASE_URL: "xxx"
  LLM_MODEL: "gemini-3-flash-preview"
  LLM_PROXY: null
  LLM_BACKEND: "openai"   # "openai" | "anthropic"

web_tools_config:
  SERPER_KEY: "xxx"
  JINA_KEY: "xxx"

pipeline_config:           # main.py 运行参数
  MAX_WORKERS: 8           # 并行下载/生成文件的线程数
  USER_PROFILE_PATH: "user_profile.txt"   # 独立运行 main.py 时的默认输入
  OUTPUT_DIR: "output"                     # 独立运行 main.py 时的默认输出

generate_user_profile_config: # 生成user profile
  PROFILE_GENERATION_PROMPT: "prompts/profile_generation_prompt.md"
  output_dir: null   # null → defaults to Outputs/profiles/
  count: 3

batch_generate_config: # 根据user_profile生成environment
  profiles_dir: null              # null → defaults to Outputs/profiles/
  envs_dir: "Outputs/environments"  # 相对于 user_simulator_agent/ 的路径
  pattern: "*.json"
  skip_existing: true # 跳过已经生成的文件
  max_concurrency: 8  # 并行生成环境的最大并发数

profile_analyzer_config:
  PROMPT_TMPL: "prompts/profile_analyzer_prompt.md"

computer_spec_designer_config:
  PROMPT_DIRS: "prompts/computer_spec_dirs.md"
  PROMPT_PDF: "prompts/computer_spec_pdf.md"
  PROMPT_HTML: "prompts/computer_spec_html.md"
  PROMPT_EXCEL_CSV: "prompts/computer_spec_excel_csv.md"
  PROMPT_DOCX: "prompts/computer_spec_docx.md"
  PROMPT_XLSX: "prompts/computer_spec_xlsx.md"
  PROMPT_MD: "prompts/computer_spec_md.md"
  PROMPT_IMAGE: "prompts/computer_spec_image.md"
  PROMPT_VIDEO: "prompts/computer_spec_video.md"
  PROMPT_AUDIO: "prompts/computer_spec_audio.md"
  PROMPT_FILE_COUNTS: "prompts/computer_spec_file_counts.md"
  PROMPT_ENVCONFIG: "prompts/computer_spec_envconfig.md"

user_agent_builder_config:
  PROMPT_TMPL: "prompts/user_agent_builder_prompt.md"

user_query_generator_config:
  PROMPT_TMPL: "prompts/user_query_generate_prompt.md"

uquery_generate_config:         # ControlCenter/uquery_generate.py
  tasks:                        # 多组倾向配置，每组独立调用 LLM
    - tendency: "生活类"
      count: 10
    - tendency: "学习类"
      count: 10
  max_concurrency: 8            # 并发处理 profile 数量
  skip_existing: true           # 跳过已生成的 user_queries.json
