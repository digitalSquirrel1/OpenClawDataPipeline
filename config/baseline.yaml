# 代码仓归档版本（脱敏）
# 此配置文件不生效，无法运行，只是个样例：此配置只是示例模板，由于缺失key无法运行。需要运行请联系kcq获取baseline_using.yaml。
# 实际运行时读取的是baseline_using.yaml，任何配置修改请在baseline_using.yaml进行

api_config:
  LLM_API_KEY: "sk-xxx"
  LLM_BASE_URL: "xxx"
  LLM_MODEL: "gemini-3-flash-preview" # "gpt-5.2"
  LLM_PROXY: null
  LLM_BACKEND: "openai"   # "openai" | "anthropic"

web_tools_config:
  SERPER_KEY: "xxx"
  JINA_KEY: "jina_xxx"

pipeline_config:           # main.py 运行参数
  MAX_LLM_CALLS: 50
  MAX_WORKERS: 8           # 并行下载/生成文件的线程数
  USER_PROFILE_PATH: "user_profile.txt"   # 独立运行 main.py 时的默认输入
  OUTPUT_DIR: "output"                     # 独立运行 main.py 时的默认输出

generate_user_profile_config: # 生成user profile
  PROFILE_GENERATION_PROMPT: "prompts/profile_generation_prompt.md"
  profiles_dir: "Outputs/260316/profiles"   # null → defaults to Outputs/profiles/
  count: 5

batch_generate_config: # 根据user_profile生成environment
  profiles_dir: "Outputs/260316/profiles"  # null → defaults to Outputs/profiles/
  envs_dir: "Outputs/260316/environments"  # 相对于 user_simulator_agent/ 的路径
  WINDOWS_MAP_RATIO: 0.7  # 生成 MAP_Windows.json 的概率，1-此值 为生成 MAP_Linux.json 的概率
  # overwrite_existing: true # 重新生成并覆盖已经生成的文件，注释掉是False，只要打开都是True

profile_analyzer_config:
  PROMPT_TMPL: "prompts/profile_analyzer_prompt.md"

computer_spec_designer_config:
  PROMPT_DIRS: "prompts/computer_spec_dirs.md"
  PROMPT_PDF: "prompts/computer_spec_pdf.md"
  PROMPT_HTML: "prompts/computer_spec_html.md"
  PROMPT_EXCEL_CSV: "prompts/computer_spec_excel_csv.md"
  PROMPT_DOCX: "prompts/computer_spec_docx.md"
  PROMPT_XLSX: "prompts/computer_spec_xlsx.md"
  PROMPT_MD: "prompts/computer_spec_md.md"
  PROMPT_IMAGE: "prompts/computer_spec_image.md"
  PROMPT_VIDEO: "prompts/computer_spec_video.md"
  PROMPT_AUDIO: "prompts/computer_spec_audio.md"
  PROMPT_FILE_COUNTS: "prompts/computer_spec_file_counts.md"
  PROMPT_ENVCONFIG: "prompts/computer_spec_envconfig.md"

user_agent_builder_config:
  PROMPT_TMPL: "prompts/user_agent_builder_prompt.md"

user_query_generator_config:
  PROMPT_TMPL: "prompts/user_query_generate_prompt.md"

query_gen_with_topic_skill_profile_config:
  topics_txt_path: "Examples/topics.txt"        # topics 文件路径（相对于项目根目录）
  profiles_dir: "Outputs/260316/profiles" # "Outputs/profiles"              # 用户 profile 所在文件夹（相对于项目根目录）
  envs_dir: null # "Outputs/260316/environments"  # null → 不读取环境信息，走纯 topic+skills+profile 模式
  output_dir: "Outputs/260316/queries_with_skills_noenv" # 输出目录（相对于项目根目录）
  num_user_per_topic:  null                    # null代表profile_dir下面所有的都读，每个 topic 最多使用多少个 profile，null 表示全部使用
  queries_per_combination: 5                   # 每组 (topic, profile) 生成的 query 数量
  skip_existing: true                          # 跳过已生成的 profile 结果
  use_match_skills: true                       # true → 用 topic 搜索 skills；false → 不搜索，传入空 skills 列表
  PROMPT_TMPL: "prompts/query_gen_with_topic_skill_profile_prompt.md"
  PROMPT_TMPL_ENV: "prompts/query_gen_with_topic_skill_profile_env_prompt.md"
  PROMPT_TMPL_ENV_LINUX: "prompts/query_gen_with_topic_skill_profile_env_linux_prompt.md"

topic_search_skills_config:
  skills_json_path: "Examples/skills.json"              # skills.json 路径（相对于项目根目录）
  topic_to_skills_map: null                            # 倒排索引路径，null 则默认为 skills.json 同目录下的 skills_index.json
  skills_dir: "Examples/skills_library"
  max_skills_per_topic: 5

# standard_format_config: # 标准格式化打包, 直接加入envs_dir
#   info_dir: "Outputs/260316/queries_with_skills"    # 输入: queries_with_skills JSON 目录
#   output_dir: null # "Outputs/standard_output"      # 输出: 打包文件夹目录
#   profiles_dir: "Outputs/260316/profiles"
#   envs_dir: "Outputs/260316/environments" # 和output_dir互斥，有envs_dir时，output_dir必须是null
#   skills_dir: null

standard_format_config: # 标准格式化打包, 没有envs_dir，单独保存到output_dir
  info_dir: "Outputs/260316/queries_with_skills_noenv"    # 输入: queries_with_skills JSON 目录
  output_dir: "Outputs/260316/standard_output_noenv"      # 输出: 打包文件夹目录
  profiles_dir: "Outputs/260316/profiles"
  envs_dir: null # "Outputs/260312/environments_check" # 和output_dir互斥，有envs_dir时，output_dir必须是null
  skills_dir: null
